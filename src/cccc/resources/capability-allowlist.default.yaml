schema_version: 1
policy_id: cccc-capability-allowlist-2026-02-26
snapshot_date: "2026-02-26"
description: >
  Baseline capability allowlist for CCCC MCP/skills dynamic disclosure.
  Goal: maximize practical capability boundary with controlled risk and
  predictable runtime behavior.

level_semantics:
  indexed: "Synced in local catalog only; not shown in normal search results."
  mounted: "Visible/discoverable; can be enabled on demand."
  enabled: "Mounted + preferred baseline intent; requires explicit enable or profile default application."
  pinned: "Enabled + long-lived baseline intent; should be applied via actor-profile/role pinned defaults."

defaults:
  source_level:
    cccc_builtin: enabled
    anthropic_skills: mounted
    github_skills_curated: mounted
    github_skills_remote: mounted
    agentskills_remote: mounted
    skillsmp_remote: mounted
    clawhub_remote: mounted
    mcp_registry_official: mounted
    agentskills_validator: indexed

  # Matches current CCCC implementation boundary.
  install_mode_allowlist:
    - remote_only
    - package:npm

  # High-impact tags are informational only in runtime.
  # Enforcement is operational block/unblock via cccc_capability_block.
  risk_tags_high_impact:
    - computer_use
    - desktop_control
    - browser_automation
    - filesystem_write
    - terminal_exec
    - trading
    - payment_write

sources:
  - source_id: cccc_builtin
    enabled: true
    rationale: "Core CCCC packs; always available."
  - source_id: anthropic_skills
    enabled: true
    rationale: "Official Anthropic skill source."
  - source_id: github_skills_curated
    enabled: true
    rationale: "Curated third-party skill entries (manual curation, no periodic crawling)."
  - source_id: github_skills_remote
    enabled: true
    rationale: "On-demand GitHub remote search for SKILL.md candidates."
  - source_id: agentskills_remote
    enabled: true
    rationale: "On-demand AgentSkills-aligned remote search (GitHub ecosystem)."
  - source_id: skillsmp_remote
    enabled: true
    rationale: "On-demand SkillsMP remote search via text proxy."
  - source_id: clawhub_remote
    enabled: true
    rationale: "On-demand ClawHub remote search via text proxy."
  - source_id: mcp_registry_official
    enabled: true
    rationale: "Primary MCP discovery source (local snapshot + on-demand fallback)."
  - source_id: agentskills_validator
    enabled: true
    rationale: "Schema/validator baseline, not treated as market source."

mcp_overrides:
  # --------------------------------------------------------------------------
  # Tier A: default mounted (high utility, reasonable trust, practical today)
  # --------------------------------------------------------------------------
  - capability_id: mcp:io.github.github/github-mcp-server
    level: mounted
    trust: high
    install_mode_preference: remote_only
    notes: "Official GitHub MCP; broad repo/issue/PR workflows."

  - capability_id: mcp:io.github.ChromeDevTools/chrome-devtools-mcp
    level: enabled
    trust: high
    install_mode_preference: package:npm
    notes: "High-ROI browser debugging/inspection for engineering tasks."

  - capability_id: mcp:io.github.brave/brave-search-mcp-server
    level: mounted
    trust: high
    install_mode_preference: package:npm
    required_secrets:
      - BRAVE_API_KEY
    notes: "High-quality web retrieval."

  - capability_id: mcp:com.atlassian/atlassian-mcp-server
    level: mounted
    trust: high
    install_mode_preference: remote_only
    notes: "Official Atlassian MCP (Jira/Confluence ecosystem)."

  - capability_id: mcp:com.gitlab/mcp
    level: mounted
    trust: high
    install_mode_preference: remote_only
    notes: "Official GitLab MCP."

  - capability_id: mcp:com.supabase/mcp
    level: mounted
    trust: high
    install_mode_preference: package:npm
    required_secrets:
      - SUPABASE_ACCESS_TOKEN
    notes: "Common backend/data workflows for dev teams."

  - capability_id: mcp:io.github.getsentry/sentry-mcp
    level: mounted
    trust: high
    install_mode_preference: package:npm
    required_secrets:
      - SENTRY_ACCESS_TOKEN
    notes: "Production debugging and issue triage."

  - capability_id: mcp:com.cloudflare.mcp/mcp
    level: mounted
    trust: high
    install_mode_preference: remote_only
    notes: "Infra/network/platform operations; remote auth expected."

  - capability_id: mcp:app.linear/linear
    level: mounted
    trust: medium
    install_mode_preference: remote_only
    notes: "Project/issue management."

  - capability_id: mcp:com.notion/mcp
    level: mounted
    trust: medium
    install_mode_preference: remote_only
    notes: "Knowledge/doc workflows."

  - capability_id: mcp:io.github.browserbase/mcp-server-browserbase
    level: mounted
    trust: medium
    install_mode_preference: package:npm
    required_secrets:
      - BROWSERBASE_API_KEY
      - BROWSERBASE_PROJECT_ID
      - GEMINI_API_KEY
    notes: "Powerful browser automation; key-heavy setup."

  - capability_id: mcp:com.make/mcp-server
    level: mounted
    trust: medium
    install_mode_preference: remote_only
    notes: "Workflow automation orchestrator."

  - capability_id: mcp:ai.com.mcp/registry
    level: mounted
    trust: medium
    install_mode_preference: remote_only
    notes: "MCP ecosystem self-discovery."

  - capability_id: mcp:ai.com.mcp/skills-search
    level: mounted
    trust: medium
    install_mode_preference: remote_only
    notes: "AgentSkills discovery bridge."

  - capability_id: mcp:io.github.upstash/context7
    level: mounted
    trust: high
    install_mode_preference: package:npm
    notes: "High-ROI code/docs context retrieval."

  - capability_id: mcp:ai.parallel/search-mcp
    level: mounted
    trust: medium
    install_mode_preference: remote_only
    notes: "Remote search MCP fallback with broad web coverage."

  - capability_id: mcp:com.figma.mcp/mcp
    level: mounted
    trust: high
    install_mode_preference: remote_only
    notes: "Design-file execution surface for product/design workflows."

  # --------------------------------------------------------------------------
  # Tier B: mounted (high risk/high privilege; visible, use runtime blocklist as needed)
  # --------------------------------------------------------------------------
  - capability_id: mcp:io.github.domdomegg/computer-use-mcp
    level: mounted
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - computer_use
      - desktop_control
    notes: "Powerful desktop control; apply runtime blocklist when task boundary requires."

  - capability_id: mcp:io.github.CursorTouch/Windows-MCP
    level: mounted
    trust: medium
    install_mode_preference: package:pypi
    risk_tags:
      - computer_use
      - desktop_control
    notes: "Windows computer-use MCP; currently outside default installer support."

  - capability_id: mcp:io.github.wonderwhy-er/desktop-commander
    level: mounted
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - desktop_control
      - terminal_exec
      - filesystem_write
    notes: "Desktop + file + terminal control; high-power local mutation surface."

  - capability_id: mcp:io.github.bytedance/mcp-server-browser
    level: mounted
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - computer_use
      - browser_automation
    notes: "UI-TARS browser execution surface; high privilege, monitor and block when needed."

  - capability_id: mcp:io.github.bytedance/mcp-server-filesystem
    level: mounted
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - filesystem_write
    notes: "Filesystem mutation surface from UI-TARS stack."

  - capability_id: mcp:io.github.therealtimex/browser-use
    level: mounted
    trust: medium
    install_mode_preference: package:pypi
    risk_tags:
      - computer_use
      - browser_automation
    notes: "Browser-use execution MCP (pypi path currently unavailable in default installer matrix)."

  - capability_id: mcp:io.github.hummingbot/mcp
    level: mounted
    trust: medium
    install_mode_preference: package:oci
    risk_tags:
      - trading
    notes: "Trading execution domain; keep indexed by default."

  - capability_id: mcp:agency.lona/trading
    level: mounted
    trust: medium
    install_mode_preference: remote_only
    risk_tags:
      - trading
    notes: "Trading analytics/execution domain; explicit promotion only."

  - capability_id: mcp:com.stripe/mcp
    level: mounted
    trust: high
    install_mode_preference: remote_only
    risk_tags:
      - payment_write
    notes: "Financial/payment mutation potential; keep out of default mounted set."

  - capability_id: mcp:io.github.amol21p/interactive-terminal
    level: mounted
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - terminal_exec
    notes: "Interactive terminal surface is high privilege."

skills:
  source_overrides:
    - source_id: anthropic_skills
      level: mounted
      rationale: "Official high-quality skill corpus."
    - source_id: github_skills_curated
      level: mounted
      rationale: "Curated third-party skills are discoverable by default."

  # Keep all official Anthropic skills discoverable by default.
  official_anthropic:
    - capability_id: skill:anthropic:algorithmic-art
      level: mounted
    - capability_id: skill:anthropic:brand-guidelines
      level: mounted
    - capability_id: skill:anthropic:canvas-design
      level: mounted
    - capability_id: skill:anthropic:doc-coauthoring
      level: mounted
    - capability_id: skill:anthropic:docx
      level: mounted
    - capability_id: skill:anthropic:frontend-design
      level: mounted
    - capability_id: skill:anthropic:internal-comms
      level: mounted
    - capability_id: skill:anthropic:mcp-builder
      level: mounted
      pinned_roles: [foreman]
    - capability_id: skill:anthropic:pdf
      level: mounted
    - capability_id: skill:anthropic:pptx
      level: mounted
    - capability_id: skill:anthropic:skill-creator
      level: mounted
      pinned_roles: [foreman]
    - capability_id: skill:anthropic:slack-gif-creator
      level: mounted
    - capability_id: skill:anthropic:theme-factory
      level: mounted
    - capability_id: skill:anthropic:web-artifacts-builder
      level: mounted
    - capability_id: skill:anthropic:webapp-testing
      level: enabled
    - capability_id: skill:anthropic:xlsx
      level: mounted

  curated:
    - capability_id: skill:github:blader:claudeception
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/blader/Claudeception
      trust: medium
      qualification_status: qualified
      tags:
        - self-evolution
        - skill-authoring
      description_short: "Captures non-obvious lessons and turns them into reusable skills."
      capsule_text: |
        Skill: Claudeception
        Use when the actor discovers non-obvious debugging/workflow insights worth reusing.
        Output should be concise and actionable; avoid rewriting baseline safety rules.

    - capability_id: skill:github:blader:humanizer
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/blader/humanizer
      trust: medium
      qualification_status: qualified
      tags:
        - style
        - communication
      description_short: "Polishes phrasing to reduce robotic tone while preserving meaning."
      capsule_text: |
        Skill: Humanizer
        Use for final-pass wording polish only.
        Preserve facts, constraints, and actionability; do not alter technical intent.

role_defaults:
  foreman:
    pinned:
      - skill:anthropic:mcp-builder
      - skill:anthropic:skill-creator
  peer:
    pinned: []
  auditor:
    pinned: []

operations:
  suggested_promotions:
    - "Promote indexed -> mounted only after smoke test + auth check + tool schema sanity."
    - "Promote mounted -> enabled only when call success rate is stable and context budget allows."
    - "Use pinned sparingly; keep actor prompt baseline minimal."
  suggested_demotions:
    - "Demote to indexed on repeated auth/install failures, long tail latency, or unsafe behavior."
