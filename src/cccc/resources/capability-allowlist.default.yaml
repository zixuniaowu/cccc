schema_version: 1
policy_id: cccc-capability-allowlist-2026-02-26
snapshot_date: "2026-02-26"
description: >
  Baseline capability allowlist for CCCC MCP/skills dynamic disclosure.
  Goal: maximize practical capability boundary with controlled risk and
  predictable runtime behavior.

level_semantics:
  indexed: "Synced in local catalog only; not shown in normal search results."
  mounted: "Visible/discoverable; can be enabled on demand. (formerly: enabled merged into mounted)"
  pinned: "Mounted + long-lived baseline intent; typically mapped into actor/profile autoload defaults."

defaults:
  source_level:
    cccc_builtin: mounted
    manual_import: mounted
    agent_self_proposed: indexed
    anthropic_skills: mounted
    github_skills_curated: mounted
    skillsmp_remote: indexed
    clawhub_remote: indexed
    openclaw_skills_remote: indexed
    clawskills_remote: indexed
    mcp_registry_official: indexed

  # Matches current CCCC implementation boundary.
  install_mode_allowlist:
    - remote_only
    - package:npm
    - package:pypi
    - package:oci

  # High-impact tags are informational only in runtime.
  # Enforcement is operational block/unblock via cccc_capability_block.
  risk_tags_high_impact:
    - computer_use
    - desktop_control
    - browser_automation
    - filesystem_write
    - terminal_exec
    - trading
    - payment_write

sources:
  - source_id: cccc_builtin
    enabled: true
    rationale: "Core CCCC packs; always available."
  - source_id: manual_import
    enabled: true
    rationale: "Agent/user imported records from arbitrary external references."
  - source_id: agent_self_proposed
    enabled: true
    rationale: "Agent-proposed procedural skill candidates; MCP toolpacks stay indexed unless policy explicitly promotes them."
  - source_id: anthropic_skills
    enabled: true
    rationale: "Official Anthropic skill source."
  - source_id: github_skills_curated
    enabled: true
    rationale: "Curated third-party skill entries (manual curation, no periodic crawling)."
  - source_id: skillsmp_remote
    enabled: true
    rationale: "On-demand SkillsMP search (API key if configured; proxy fallback otherwise)."
  - source_id: clawhub_remote
    enabled: true
    rationale: "On-demand ClawHub remote search via official JSON API."
  - source_id: openclaw_skills_remote
    enabled: true
    rationale: "On-demand OpenClaw skills search from GitHub SKILL.md corpus."
  - source_id: clawskills_remote
    enabled: true
    rationale: "On-demand clawskills.co skills index search."
  - source_id: mcp_registry_official
    enabled: true
    rationale: "Primary MCP discovery source (local snapshot + on-demand fallback); indexed by default, with only lightweight verified exceptions promoted."

mcp_overrides:
  # --------------------------------------------------------------------------
  # Tier A: lightweight default-mounted MCP exceptions
  # --------------------------------------------------------------------------
  - capability_id: mcp:io.github.github/github-mcp-server
    level: indexed
    trust: high
    install_mode_preference: remote_only
    notes: "Official GitHub MCP; broad repo/issue/PR workflows."

  - capability_id: mcp:io.github.ChromeDevTools/chrome-devtools-mcp
    level: indexed
    trust: high
    install_mode_preference: package:npm
    notes: "High-ROI browser debugging/inspection for engineering tasks."

  - capability_id: mcp:io.github.brave/brave-search-mcp-server
    level: indexed
    trust: high
    install_mode_preference: package:npm
    required_secrets:
      - BRAVE_API_KEY
    notes: "High-quality web retrieval."

  - capability_id: mcp:com.atlassian/atlassian-mcp-server
    level: indexed
    trust: high
    install_mode_preference: remote_only
    notes: "Official Atlassian MCP (Jira/Confluence ecosystem)."

  - capability_id: mcp:com.gitlab/mcp
    level: indexed
    trust: high
    install_mode_preference: remote_only
    notes: "Official GitLab MCP."

  - capability_id: mcp:com.supabase/mcp
    level: indexed
    trust: high
    install_mode_preference: package:npm
    required_secrets:
      - SUPABASE_ACCESS_TOKEN
    notes: "Common backend/data workflows for dev teams."

  - capability_id: mcp:io.github.getsentry/sentry-mcp
    level: indexed
    trust: high
    install_mode_preference: package:npm
    required_secrets:
      - SENTRY_ACCESS_TOKEN
    notes: "Production debugging and issue triage."

  - capability_id: mcp:com.cloudflare.mcp/mcp
    level: indexed
    trust: high
    install_mode_preference: remote_only
    notes: "Infra/network/platform operations; remote auth expected."

  - capability_id: mcp:app.linear/linear
    level: indexed
    trust: medium
    install_mode_preference: remote_only
    notes: "Project/issue management."

  - capability_id: mcp:com.notion/mcp
    level: indexed
    trust: medium
    install_mode_preference: remote_only
    notes: "Knowledge/doc workflows."

  - capability_id: mcp:io.github.browserbase/mcp-server-browserbase
    level: indexed
    trust: medium
    install_mode_preference: package:npm
    required_secrets:
      - BROWSERBASE_API_KEY
      - BROWSERBASE_PROJECT_ID
      - GEMINI_API_KEY
    notes: "Powerful browser automation; key-heavy setup."

  - capability_id: mcp:com.make/mcp-server
    level: indexed
    trust: medium
    install_mode_preference: remote_only
    notes: "Workflow automation orchestrator."

  - capability_id: mcp:ai.com.mcp/registry
    level: indexed
    trust: medium
    install_mode_preference: remote_only
    notes: "MCP ecosystem self-discovery."

  - capability_id: mcp:ai.com.mcp/skills-search
    level: indexed
    trust: medium
    install_mode_preference: remote_only
    notes: "AgentSkills discovery bridge."

  - capability_id: mcp:io.github.upstash/context7
    level: mounted
    name: Context7
    description_short: "Retrieve current library documentation and code examples through a narrow MCP surface."
    source_uri: https://github.com/upstash/context7
    trust: high
    install_mode: package
    install_spec:
      registry_type: npm
      runtime_hint: npx
      identifier: "@upstash/context7-mcp"
    notes: "High-ROI code/docs context retrieval."

  - capability_id: mcp:io.github.yamadashy/repomix
    level: mounted
    name: Repomix
    description_short: "Pack a scoped local or public repository into an AI-friendly artifact for analysis."
    source_uri: https://github.com/yamadashy/repomix
    trust: high
    install_mode: package
    install_spec:
      registry_type: npm
      runtime_hint: npx
      identifier: repomix
      package_arguments:
        - "--mcp"
    risk_tags:
      - filesystem_read
    tags:
      - repository
      - codebase
      - context
    notes: "High-ROI repository analysis MCP; agents should scope use to the current workspace or an explicit public repository."

  - capability_id: mcp:io.github.idosal/git-mcp
    level: mounted
    name: GitMCP
    description_short: "Access public GitHub repository documentation and code context through a remote MCP endpoint."
    source_uri: https://github.com/idosal/git-mcp
    trust: high
    install_mode: command
    install_spec:
      command:
        - npx
        - -y
        - mcp-remote
        - https://gitmcp.io/docs
    tags:
      - github
      - documentation
      - public-code
    notes: "Public GitHub docs/code context only; do not use as a private repository or credentialed GitHub integration."

  - capability_id: mcp:ai.parallel/search-mcp
    level: indexed
    trust: medium
    install_mode_preference: remote_only
    notes: "Remote search MCP fallback with broad web coverage."

  - capability_id: mcp:com.figma.mcp/mcp
    level: indexed
    trust: high
    install_mode_preference: remote_only
    notes: "Design-file execution surface for product/design workflows."

  # --------------------------------------------------------------------------
  # Tier B: indexed high-risk/high-privilege MCPs
  # --------------------------------------------------------------------------
  - capability_id: mcp:io.github.domdomegg/computer-use-mcp
    level: indexed
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - computer_use
      - desktop_control
    notes: "Powerful desktop control; apply runtime blocklist when task boundary requires."

  - capability_id: mcp:io.github.CursorTouch/Windows-MCP
    level: indexed
    trust: medium
    install_mode_preference: package:pypi
    risk_tags:
      - computer_use
      - desktop_control
    notes: "Windows computer-use MCP (pypi)."

  - capability_id: mcp:io.github.wonderwhy-er/desktop-commander
    level: indexed
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - desktop_control
      - terminal_exec
      - filesystem_write
    notes: "Desktop + file + terminal control; high-power local mutation surface."

  - capability_id: mcp:io.github.bytedance/mcp-server-browser
    level: indexed
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - computer_use
      - browser_automation
    notes: "UI-TARS browser execution surface; high privilege, monitor and block when needed."

  - capability_id: mcp:io.github.bytedance/mcp-server-filesystem
    level: indexed
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - filesystem_write
    notes: "Filesystem mutation surface from UI-TARS stack."

  - capability_id: mcp:io.github.therealtimex/browser-use
    level: indexed
    trust: medium
    install_mode_preference: package:pypi
    risk_tags:
      - computer_use
      - browser_automation
    notes: "Browser-use execution MCP (pypi)."

  - capability_id: mcp:io.github.hummingbot/mcp
    level: indexed
    trust: medium
    install_mode_preference: package:oci
    risk_tags:
      - trading
    notes: "Trading execution domain; keep indexed by default."

  - capability_id: mcp:agency.lona/trading
    level: indexed
    trust: medium
    install_mode_preference: remote_only
    risk_tags:
      - trading
    notes: "Trading analytics/execution domain; explicit promotion only."

  - capability_id: mcp:com.stripe/mcp
    level: indexed
    trust: high
    install_mode_preference: remote_only
    risk_tags:
      - payment_write
    notes: "Financial/payment mutation potential; keep out of default mounted set."

  - capability_id: mcp:io.github.amol21p/interactive-terminal
    level: indexed
    trust: medium
    install_mode_preference: package:npm
    risk_tags:
      - terminal_exec
    notes: "Interactive terminal surface is high privilege."

skills:
  source_overrides:
    - source_id: anthropic_skills
      level: mounted
      rationale: "Official high-quality skill corpus."
    - source_id: github_skills_curated
      level: mounted
      rationale: "Curated third-party skills are cataloged; explicit promotion required."
    - source_id: agent_self_proposed
      level: mounted
      rationale: "Low-risk capsule skill candidates may be validated and enabled at narrow scope; promotion remains policy-gated."

  # Keep all official Anthropic skills discoverable by default.
  official_anthropic:
    - capability_id: skill:anthropic:algorithmic-art
      level: mounted
    - capability_id: skill:anthropic:brand-guidelines
      level: mounted
    - capability_id: skill:anthropic:canvas-design
      level: mounted
    - capability_id: skill:anthropic:doc-coauthoring
      level: mounted
    - capability_id: skill:anthropic:docx
      level: mounted
    - capability_id: skill:anthropic:frontend-design
      level: mounted
    - capability_id: skill:anthropic:internal-comms
      level: mounted
    - capability_id: skill:anthropic:mcp-builder
      level: mounted
      pinned_roles: [foreman]
    - capability_id: skill:anthropic:pdf
      level: mounted
    - capability_id: skill:anthropic:pptx
      level: mounted
    - capability_id: skill:anthropic:skill-creator
      level: mounted
      pinned_roles: [foreman]
      description_short: "Creates and maintains procedural skills from proven workflows."
      tags:
        - self-evolution
        - skill-authoring
      capsule_text: |
        Skill: skill-creator
        When to use:
        - A completed task produced a reusable procedure, recurring pitfall, user correction, or stable verification path.
        - A loaded skill is stale, incomplete, wrong, or duplicative and should be maintained instead of copied.
        Avoid when:
        - The lesson is a one-off fact, transient task status, broad user preference, or unverified workaround.
        - The candidate would require scripts, global mutation, credentials, destructive actions, or external-source edits.
        Procedure:
        1. Search existing capabilities first; patch an existing self-proposed skill when the workflow matches.
        2. For new autonomous proposals, use capability_id skill:agent_self_proposed:<stable-slug> and source_id agent_self_proposed.
        3. Write capsule_text with When to use, Avoid when, Procedure, Pitfalls, and Verification sections.
        4. Direct-import low-risk syntax-valid capsule skills; use dry_run=true first when enabling immediately or when scope/risk is unclear.
        5. Enable only at session or actor scope first, then prove activation with capability_state.active_capsule_skills.
        6. For stale or wrong self-proposed skills, reuse the same capability_id with revised capsule_text; do not create near-duplicates.
        Pitfalls:
        - Do not confuse catalog presence with runtime activation.
        - Do not overwrite curated namespaces such as skill:anthropic:* or skill:github:* with self-proposed content.
        - Do not wait for the user to gate routine low-risk skill evolution, but keep it visible and reversible.
        Verification:
        - Confirm the import result is qualified or intentionally blocked with explicit qualification_reasons.
        - Re-read capability_state.active_capsule_skills when activation is intended.
        - Check the Web Capability Governance self-evolving candidates list for visibility and later management.
    - capability_id: skill:anthropic:slack-gif-creator
      level: mounted
    - capability_id: skill:anthropic:theme-factory
      level: mounted
    - capability_id: skill:anthropic:web-artifacts-builder
      level: mounted
    - capability_id: skill:anthropic:webapp-testing
      level: mounted
    - capability_id: skill:anthropic:xlsx
      level: mounted

  curated:
    - capability_id: skill:github:blader:claudeception
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/blader/Claudeception
      trust: medium
      qualification_status: qualified
      tags:
        - self-evolution
        - skill-authoring
      description_short: "Captures non-obvious lessons and turns them into reusable skills."
      capsule_text: |
        Skill: Claudeception
        When to use:
        - The actor discovers a non-obvious debugging path, workflow insight, or recurring correction that should improve future runs.
        - A current skill failed, was incomplete, or caused duplicate rediscovery and should be patched or superseded.
        Avoid when:
        - The content is only task progress, broad memory, transient environment state, or a generic best practice.
        - The proposed change would mutate global defaults, external curated skills, or executable scripts without explicit policy support.
        Procedure:
        1. Search existing skills and self-proposed candidates before creating anything new.
        2. Prefer a targeted update to the existing self-proposed capability_id when the semantics match.
        3. Create new CCCC-native proposals under skill:agent_self_proposed:<stable-slug> with source_id agent_self_proposed.
        4. Keep the capsule concise and procedural: trigger, steps, pitfalls, and concrete verification.
        5. Use dry_run=true when enabling immediately, risk/scope is unclear, or diagnostics are needed; otherwise direct-import low-risk capsule proposals.
        6. Activate first at session or actor scope and verify via capability_state.active_capsule_skills.
        Pitfalls:
        - Do not emit diary-style transcripts as skills.
        - Do not create near-duplicate skills when an existing candidate can be updated.
        - Do not assume indexed child skills are active; explicitly search or enable the specific capability needed.
        Verification:
        - The candidate appears in the agent_self_proposed source list after import.
        - If enabled, active_capsule_skills contains the expected capability_id for the target actor.
        - If unsafe or overbroad, the record is blocked with qualification_reasons instead of activated.

    - capability_id: skill:github:blader:humanizer
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/blader/humanizer
      trust: medium
      qualification_status: qualified
      tags:
        - style
        - communication
      description_short: "Polishes phrasing to reduce robotic tone while preserving meaning."
      capsule_text: |
        Skill: Humanizer
        Use for final-pass wording polish only.
        Preserve facts, constraints, and actionability; do not alter technical intent.

    - capability_id: skill:github:addyosmani:code-review-quality
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/addyosmani/agent-skills
      trust: high
      qualification_status: qualified
      tags:
        - engineering
        - code-review
        - quality
      description_short: "Review code for correctness, maintainability, regressions, tests, and practical risk."
      use_when:
        - "The user asks for code review, PR review, regression risk, bug finding, or quality assessment."
        - "A change needs a senior engineering review before merge or handoff."
      avoid_when:
        - "The task is implementation-only and no review was requested."
        - "The review would require live production data or credentials that are not available."
      gotchas:
        - "Findings should lead; summaries are secondary."
        - "Prefer concrete file/line evidence over generic style advice."
      capsule_text: |
        Skill: code-review-quality
        Use when reviewing code changes, PRs, diffs, or implementation quality.
        Procedure:
        1. Identify the changed behavior and user-visible contract first.
        2. Look for correctness bugs, regressions, missing edge cases, security/privacy issues, and missing tests.
        3. Lead with findings ordered by severity and grounded in file/line evidence.
        4. Keep summaries short and secondary; do not praise unchanged code.
        5. If no issues are found, state that clearly and name residual test gaps.
        Pitfalls:
        - Do not turn review into broad refactoring advice.
        - Do not report style-only nits unless they create real risk.
        - Do not assume tests passed unless verified.
        Verification:
        - Every finding has a concrete impact and a traceable location.

    - capability_id: skill:github:addyosmani:debugging-error-recovery
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/addyosmani/agent-skills
      trust: high
      qualification_status: qualified
      tags:
        - engineering
        - debugging
        - tests
      description_short: "Diagnose failures with evidence-first reproduction, one hypothesis at a time, and targeted verification."
      use_when:
        - "The user reports a bug, failing test, runtime error, flaky behavior, or broken flow."
        - "A previous fix failed and the cause needs to be isolated."
      avoid_when:
        - "The task is greenfield implementation without a known symptom."
      gotchas:
        - "Do not patch before reproducing or collecting evidence."
        - "If two hypotheses fail, stop and summarize evidence rather than stacking guards."
      capsule_text: |
        Skill: debugging-error-recovery
        Use when diagnosing bugs, failing tests, runtime errors, or broken workflows.
        Procedure:
        1. Restate the exact symptom and expected behavior.
        2. Reproduce or capture concrete evidence before editing.
        3. Form one hypothesis and make the smallest reversible change.
        4. Re-run the same repro path.
        5. If the hypothesis fails, update the evidence model before another patch.
        Pitfalls:
        - Do not add defensive branches without proving the failed condition.
        - Do not treat a different passing path as proof the original bug is fixed.
        Verification:
        - The same trigger path that failed now passes, with observed output or test evidence.

    - capability_id: skill:github:nextlevelbuilder:ui-ux-pro-max
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/nextlevelbuilder/ui-ux-pro-max-skill
      trust: high
      qualification_status: qualified
      tags:
        - frontend
        - ui
        - ux
        - design
      description_short: "Improve product UI/UX quality, hierarchy, layout, interaction affordance, and visual polish."
      use_when:
        - "The task involves building or reviewing a UI, frontend screen, dashboard, web app, or product surface."
        - "The user asks for better design, visual polish, UX, layout, or product feel."
      avoid_when:
        - "The task is backend-only or purely mechanical."
      gotchas:
        - "Classify product/workspace surfaces separately from landing/showcase surfaces."
        - "Prefer usable product composition over decorative card mosaics."
      capsule_text: |
        Skill: ui-ux-pro-max
        Use when building or reviewing product UI/UX.
        Procedure:
        1. Classify the surface: product/workspace, dashboard, landing, showcase, or game.
        2. Define visual thesis, content plan, and interaction thesis before changing components.
        3. Prioritize hierarchy, density, state clarity, and workflow ergonomics.
        4. Use existing design tokens and component conventions when present.
        5. Verify desktop and mobile layout for overflow, overlap, and incoherent spacing.
        Pitfalls:
        - Do not apply landing-page art direction to routine product surfaces.
        - Do not use decoration as a substitute for information architecture.
        Verification:
        - The first viewport communicates scope, state, and primary action without visual clutter.

    - capability_id: skill:github:leonxlnx:taste-review
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/Leonxlnx/taste-skill
      trust: high
      qualification_status: qualified
      tags:
        - frontend
        - design
        - taste
        - review
      description_short: "Review frontend work for taste, anti-slop issues, visual coherence, and product polish."
      use_when:
        - "The user asks whether a UI looks good, feels polished, or needs design/taste improvements."
        - "A generated frontend needs a quality pass before delivery."
      avoid_when:
        - "The task is non-visual or no UI artifact exists."
      gotchas:
        - "Be specific about what to change; vague taste criticism is not useful."
      capsule_text: |
        Skill: taste-review
        Use for frontend/UI taste review and anti-slop passes.
        Procedure:
        1. Inspect hierarchy, spacing, typography, contrast, alignment, visual rhythm, and copy density.
        2. Identify the highest-impact polish issues first.
        3. Recommend concrete changes with expected visual effect.
        4. Preserve the existing design system unless the user asks for redesign.
        Pitfalls:
        - Do not replace the user's product with a generic trendy layout.
        - Do not over-index on color or gradients when structure is the real problem.
        Verification:
        - Recommendations are actionable and tied to visible issues.

    - capability_id: skill:github:nicobailon:visual-explainer
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/nicobailon/visual-explainer
      trust: medium
      qualification_status: qualified
      tags:
        - diagram
        - explanation
        - visual
        - documentation
      description_short: "Turn complex systems, workflows, data, or plans into diagrams and visual explanations."
      use_when:
        - "The user asks for a diagram, visual explanation, architecture map, flow, or illustrated comparison."
        - "A complex plan or system would be easier to understand visually."
      avoid_when:
        - "A short textual answer is clearer than a diagram."
      gotchas:
        - "Choose the simplest visual form: flow, table, sequence, state map, or architecture diagram."
      capsule_text: |
        Skill: visual-explainer
        Use when a visual explanation would reduce complexity.
        Procedure:
        1. Identify the concept, audience, and decision the visual should support.
        2. Choose the smallest useful visual form.
        3. Label actors, inputs, outputs, states, and failure points explicitly.
        4. Keep the diagram readable in plain Markdown when possible.
        Pitfalls:
        - Do not create decorative diagrams that hide uncertainty.
        - Do not use a visual if a concise table is clearer.
        Verification:
        - The visual makes the relationship, sequence, or tradeoff easier to inspect.

    - capability_id: skill:github:nidhinjs:prompt-master
      level: mounted
      source_id: github_skills_curated
      source_uri: https://github.com/nidhinjs/prompt-master
      trust: medium
      qualification_status: qualified
      tags:
        - prompt
        - writing
        - instruction
      description_short: "Rewrite rough requests into clear, complete, ready-to-send prompts without changing intent."
      use_when:
        - "The user asks to refine, polish, structure, or improve a prompt."
        - "A rough instruction needs to become actionable for another agent or model."
      avoid_when:
        - "The user wants the underlying task executed instead of prompt refinement."
      gotchas:
        - "Preserve intent, constraints, tone, and explicit asks."
      capsule_text: |
        Skill: prompt-master
        Use when refining or structuring prompts and task instructions.
        Procedure:
        1. Preserve the user's intent, constraints, tone, and explicit asks.
        2. Remove ambiguity and add structure only when it improves actionability.
        3. Do not answer or execute the underlying task unless asked.
        4. Return the improved prompt text directly when that is the requested artifact.
        Pitfalls:
        - Do not add new requirements.
        - Do not include meta commentary in composer-ready prompt text.
        Verification:
        - The refined prompt is complete, specific, and still faithful to the original request.

role_defaults:
  foreman:
    pinned:
      - skill:anthropic:mcp-builder
      - skill:anthropic:skill-creator
  peer:
    pinned: []
  auditor:
    pinned: []

operations:
  suggested_promotions:
    - "Promote indexed -> mounted only after smoke test + auth check + tool schema sanity."
    - "Promote mounted -> enabled only when call success rate is stable and context budget allows."
    - "Use autoload baselines sparingly; keep actor startup surface minimal."
  suggested_demotions:
    - "Demote to indexed on repeated auth/install failures, long tail latency, or unsafe behavior."
