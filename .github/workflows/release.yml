name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Web UI (bundled)
        run: |
          npm ci --prefix web
          npm -C web run lint
          npm -C web run typecheck
          npm -C web run build
          test -f src/cccc/ports/web/dist/index.html

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import re

          def _read_pyproject_version(path: str = "pyproject.toml") -> str:
            in_project = False
            with open(path, "r", encoding="utf-8") as f:
              for raw in f:
                line = raw.strip()
                if not line or line.startswith("#"):
                  continue
                if line.startswith("[") and line.endswith("]"):
                  in_project = (line == "[project]")
                  continue
                if in_project:
                  m = re.match(r"^version\s*=\s*['\"]([^'\"]+)['\"]\s*(?:#.*)?$", line)
                  if m:
                    return m.group(1)
            return ""

          tag = os.environ.get("GITHUB_REF_NAME", "")
          if not tag.startswith("v"):
            raise SystemExit(f"expected tag like v0.4.0 or v0.4.0-rc1, got: {tag!r}")

          tag_body = tag[1:]
          expected = None

          m = re.fullmatch(r"(\d+\.\d+\.\d+)", tag_body)
          if m:
            expected = m.group(1)

          if expected is None:
            m = re.fullmatch(r"(\d+\.\d+\.\d+)-(alpha|beta|rc)(\d+)", tag_body)
            if m:
              base, phase, num = m.group(1), m.group(2), m.group(3)
              phase_map = {"alpha": "a", "beta": "b", "rc": "rc"}
              expected = f"{base}{phase_map[phase]}{num}"

          if expected is None:
            m = re.fullmatch(r"(\d+\.\d+\.\d+)(a|b|rc)(\d+)", tag_body)
            if m:
              expected = f"{m.group(1)}{m.group(2)}{m.group(3)}"

          if expected is None:
            raise SystemExit(f"unsupported tag format: {tag!r}")

          version = _read_pyproject_version()
          if version != expected:
            raise SystemExit(f"tag/version mismatch: tag={tag!r} -> expected {expected!r}, pyproject.toml has {version!r}")

          print(f"OK: tag {tag!r} matches pyproject.toml version {version!r}")
          PY

      - name: Install build deps
        run: |
          python -m pip install -U pip build twine
          python -m pip install -e . pytest

      - name: Run test suite
        run: |
          python -m pytest -q

      - name: Build
        run: |
          python -m compileall -q src/cccc
          python -m build
          python -m twine check dist/*

      - name: Smoke test wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cccc version
          python - <<'PY'
          import importlib.resources as ir
          import json
          import subprocess

          web_index = ir.files("cccc.ports.web").joinpath("dist/index.html")
          help_md = ir.files("cccc.resources").joinpath("cccc-help.md")

          assert web_index.is_file(), f"missing bundled web UI: {web_index}"
          assert help_md.is_file(), f"missing bundled help playbook: {help_md}"

          proc = subprocess.Popen(
              ["cccc", "mcp"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=True,
          )
          assert proc.stdin is not None
          assert proc.stdout is not None

          proc.stdin.write(json.dumps({"jsonrpc": "2.0", "id": 1, "method": "initialize", "params": {}}) + "\n")
          proc.stdin.flush()
          init_resp = json.loads(proc.stdout.readline().strip())
          assert init_resp.get("id") == 1
          assert init_resp.get("result", {}).get("serverInfo", {}).get("name") == "cccc-mcp"

          proc.stdin.write(json.dumps({"jsonrpc": "2.0", "id": 2, "method": "tools/list", "params": {}}) + "\n")
          proc.stdin.flush()
          tools_resp = json.loads(proc.stdout.readline().strip())
          assert tools_resp.get("id") == 2
          assert isinstance(tools_resp.get("result", {}).get("tools"), list)

          proc.terminate()

          print("OK: bundled web UI + help playbook + MCP handshake")
          PY

      - name: Upload verified dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  verify-platform-smoke:
    needs: verify-linux
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            run_windows_pty: true
          - os: macos-latest
            label: macOS
            run_windows_pty: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install smoke deps
        run: |
          python -m pip install -U pip pytest pytest-timeout
          python -m pip install -e .

      - name: Run Windows PTY smoke tests
        if: matrix.run_windows_pty
        timeout-minutes: 10
        run: |
          python -m pytest -q --timeout=90 --timeout-method=thread tests/test_socket_special_ops.py tests/test_windows_pty_backend.py

      - name: Download verified dist artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Install verified wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test installed wheel on ${{ matrix.label }}
        run: |
          cccc version
          python - <<'PY'
          import json
          import subprocess

          proc = subprocess.Popen(
              ["cccc", "mcp"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              text=True,
          )
          assert proc.stdin is not None
          assert proc.stdout is not None

          proc.stdin.write(json.dumps({"jsonrpc": "2.0", "id": 1, "method": "initialize", "params": {}}) + "\n")
          proc.stdin.flush()
          init_resp = json.loads(proc.stdout.readline().strip())
          assert init_resp.get("id") == 1
          assert init_resp.get("result", {}).get("serverInfo", {}).get("name") == "cccc-mcp"

          proc.stdin.write(json.dumps({"jsonrpc": "2.0", "id": 2, "method": "tools/list", "params": {}}) + "\n")
          proc.stdin.flush()
          tools_resp = json.loads(proc.stdout.readline().strip())
          assert tools_resp.get("id") == 2
          assert isinstance(tools_resp.get("result", {}).get("tools"), list)

          proc.terminate()

          print("OK: MCP handshake on installed wheel")
          PY

  publish:
    needs:
      - verify-linux
      - verify-platform-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publish deps
        run: |
          python -m pip install -U pip twine

      - name: Download verified dist artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Determine repository
        id: repo
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)[0-9]+|(a|b|rc)[0-9]+)$ ]]; then
            echo "name=testpypi" >> $GITHUB_OUTPUT
            echo "url=https://test.pypi.org/legacy/" >> $GITHUB_OUTPUT
            echo "token=${{ secrets.TEST_PYPI_API_TOKEN }}" >> $GITHUB_OUTPUT
          else
            echo "name=pypi" >> $GITHUB_OUTPUT
            echo "url=https://upload.pypi.org/legacy/" >> $GITHUB_OUTPUT
            echo "token=${{ secrets.PYPI_API_TOKEN }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to ${{ steps.repo.outputs.name }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ steps.repo.outputs.token }}
        run: |
          python -m twine upload --repository-url "${{ steps.repo.outputs.url }}" dist/*
